# GitHub Pages デプロイ workflow テンプレート（npm 版）
#
# 使い方:
#   1. このファイルをリポジトリ直下の .github/workflows/deploy.yml にコピー
#      （このプロジェクトでは作成済み: ../../.github/workflows/deploy.yml）
#   2. <REPO_NAME> を自分のリポジトリ名に置き換える（本プロジェクトは cluade-purezen）
#   3. リポジトリ Settings → Pages → Source を「GitHub Actions」に設定
#   4. main に push すると Actions が走り、公開される

name: Deploy Slidev to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build -- --base /<REPO_NAME>/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
