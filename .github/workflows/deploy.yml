name: Deploy Slidev to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build -- --base /cluade-purezen/
      # 履歴形式URL(.../3)で来ても、ハッシュルーターのURL(.../#/...)へ転送する 404.html を生成。
      # これで古いリンクや直リンクでも 404 にならない。
      - name: Generate redirecting 404.html
        run: |
          cat > dist/404.html <<'HTML'
          <!DOCTYPE html>
          <html lang="ja">
          <head>
            <meta charset="utf-8">
            <title>Redirecting…</title>
            <script>
              (function () {
                var base = '/cluade-purezen/';
                var p = location.pathname;
                if (p.indexOf(base) === 0 && p !== base) {
                  location.replace(base + '#' + p + location.search);
                } else {
                  location.replace(base);
                }
              })();
            </script>
          </head>
          <body>Redirecting…</body>
          </html>
          HTML
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
